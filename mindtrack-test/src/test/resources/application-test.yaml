server:
  port: 0

spring:
  config:
    import: ""
  datasource:
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  liquibase:
    default-schema: mtrack
    liquibase-schema: liquibase
    enabled: true
  quartz:
    properties:
      org:
        quartz:
          jobStore:
            tablePrefix: qrtz.QRTZ_
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/issuer
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  kafka:
    producer:
      bootstrap-servers: localhost:29092
    consumer:
      bootstrap-servers: localhost:29092

mtrack:
  mail:
    mail-confirmation-url: http://localhost:8080/api/v1/auth/confirm-email?token=%s
  job:
    quartz:
      datasource:
        url: ${spring.datasource.url}?currentSchema=qrtz
        username: ${spring.datasource.username}
        password: ${spring.datasource.password}
        driver-class-name: ${spring.datasource.driver-class-name}
