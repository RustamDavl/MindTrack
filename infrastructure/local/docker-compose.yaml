services:
  mindtrack-app:
    image: rustamdavl/mindtrack-app:latest
    profiles: ["dev"]
    environment:
      SPRING_PROFILES_ACTIVE: local
    volumes:
      - ./.env.docker:/app/mindtrack-application/.env:ro
    ports:
      - "8080:8080"
    depends_on:
      - mindtrack-postgres
      - mindtrack-mailhog
      - broker-1
      - broker-2

  mindtrack-postgres:
    image: postgres:17.0
    profiles: ["local", "dev"]
    container_name: mindtrack-postgres-cont
    environment:
      POSTGRES_DB: mindtrack
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    restart: always
    volumes:
      - ../dev/postgres/init:/docker-entrypoint-initdb.d
      - mtrackpostgresdb-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  mindtrack-mailhog:
    image: mailhog/mailhog:latest
    profiles: ["local", "dev"]
    container_name: mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  controller-1:
    image: apache/kafka:latest
    profiles: ["local", "dev"]
    container_name: controller-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: JAO1evNCTT6D6A59WkoA3w
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  broker-1:
    image: apache/kafka:latest
    profiles: ["local", "dev"]
    container_name: broker-1
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_CLUSTER_ID: JAO1evNCTT6D6A59WkoA3w
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    depends_on:
      - controller-1

  broker-2:
    image: apache/kafka:latest
    profiles: ["local", "dev"]
    container_name: broker-2
    ports:
      - "39092:9092"
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_CLUSTER_ID: JAO1evNCTT6D6A59WkoA3w
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:19092,PLAINTEXT_HOST://localhost:39092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    depends_on:
      - controller-1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["local", "dev"]
    ports:
      - "1010:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=broker-1:19092,broker-2:19092
    depends_on:
      - broker-1
      - broker-2
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: mindtrack-opensearch
    profiles: ["test"]
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node

      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=OhMyGodRonny0_0
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    profiles: ["test"]
    container_name: mindtrack-opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
    depends_on:
      - opensearch

volumes:
  mtrackpostgresdb-volume:
  opensearch-data: